<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Supermercado{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <meta name="theme-color" content="#0d6efd">

    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logos/pwa-192.png') }}">
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="app-header">
    <div class="app-header-left">
        <img
            class="app-logo"
            src="{{ url_for('static', filename='images/logos/icon-logo-mobile.png') }}"
            alt="Supermercado"
        />
        <div class="app-title">
            <strong>{{ session.supermercado_nome or 'Supermercado' }}</strong>
            <span class="app-subtitle">{% if page=='produtos' %}Gerenciar produtos{% else %}Lista de compras{% endif %}</span>
        </div>
    </div>

    <div class="app-header-right">
        <button class="icon-btn btn-search" type="button" aria-label="Buscar">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>

        {% if session.user_foto %}
        <a href="{{ url_for('auth.logout') }}" class="user-avatar-wrap" title="Sair ({{ session.user_nome }})">
            <img class="user-avatar" src="{{ session.user_foto }}" alt="{{ session.user_nome }}">
        </a>
        {% endif %}
    </div>
</header>

<div class="mobile-search">
    <div class="mobile-search-inner">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar..." />
        <button class="mobile-search-clear" type="button" aria-label="Limpar">×</button>
    </div>
</div>

<main class="app-main">
    {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">

    <a href="{{ url_for('pages.home') }}"
       class="bottom-item {% if page=='home' %}active{% endif %}">
        <i class="fa-solid fa-cart-shopping"></i>
        <small>Compras</small>
    </a>

    <button type="button" class="bottom-item bottom-item-camera" onclick="abrirCameraNavBtn()" aria-label="Escanear produto">
        <span class="camera-fab">
            <i class="fa-solid fa-camera"></i>
        </span>
        <small>Escanear</small>
    </button>

    <a href="{{ url_for('pages.produtos') }}"
       class="bottom-item {% if page=='produtos' %}active{% endif %}">
        <i class="fa-solid fa-box-open"></i>
        <small>Produtos</small>
    </a>

    <a href="{{ url_for('pages.selecionar_supermercado') }}"
       class="bottom-item {% if page=='selecionar' %}active{% endif %}">
        <i class="fa-solid fa-store"></i>
        <small>Mercado</small>
    </a>

</nav>


<div class="modal" id="modalCamera">
    <div class="modal-content modal-camera">
        <div class="modal-head">
            <h3>Escanear produto</h3>
            <button type="button" class="modal-x" onclick="fecharCamera()" aria-label="Fechar">×</button>
        </div>
        <div class="camera-wrapper">
            <video id="camera-video" autoplay muted playsinline></video>
            <canvas id="camera-canvas" style="display:none"></canvas>
            <div class="camera-viewfinder">
                <div class="camera-frame-corner tl"></div>
                <div class="camera-frame-corner tr"></div>
                <div class="camera-frame-corner bl"></div>
                <div class="camera-frame-corner br"></div>
                <div class="camera-scan-line"></div>
            </div>
        </div>
        <p id="camera-status" class="camera-status">Iniciando câmera...</p>
        <div class="modal-actions">
            <button type="button" class="btn-ghost" style="width:100%" onclick="fecharCamera()">
                <i class="fa-solid fa-xmark"></i>
                Fechar câmera
            </button>
        </div>
    </div>
</div>


<div class="modal" id="modalScanResultado">
    <div class="modal-content">
        <div class="modal-head">
            <h3 id="scan-titulo">Produto encontrado</h3>
            <button type="button" class="modal-x" onclick="fecharModalScan()" aria-label="Fechar">×</button>
        </div>
        <div id="scan-corpo"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>

<script>
function paginaEmBreve() {
    alert("🚧 Página em desenvolvimento");
}

function abrirCameraNavBtn() {
    if (document.querySelector('.categories')) {
        abrirCamera();
    } else {
        window.location.href = "{{ url_for('pages.home') }}";
    }
}
</script>

</body>
</html>
