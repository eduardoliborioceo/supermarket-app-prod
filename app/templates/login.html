<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Entrar — Supermercado</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <meta name="theme-color" content="#0d6efd">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="login-body">

<div class="login-wrap">
    <div class="login-card">
        <img
            class="login-logo"
            src="{{ url_for('static', filename='images/logos/icon-logo-mobile.png') }}"
            alt="Supermercado"
        >
        <h1 class="login-title">Supermercado</h1>
        <p class="login-sub">Organize sua lista de compras<br>de forma rápida e simples.</p>

        <a href="{{ url_for('auth.google_login') }}" class="btn-google">
            <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
            Entrar com Google
        </a>

        <div class="login-or"><span>ou</span></div>

        <button class="btn-install-login" id="btn-instalar" onclick="instalarApp()">
            <i class="fa-solid fa-arrow-down-to-bracket"></i>
            Instalar App no celular
        </button>
    </div>

    <div class="login-credit">
        <span class="login-credit-line"></span>
        <p class="login-credit-text">
            <span class="login-credit-name">Eduardo Libório</span>
            <span class="login-credit-dot">·</span>
            <span class="login-credit-role">CEO, Vertex Code</span>
        </p>
        <div class="login-credit-logos">
            <img
                class="login-credit-avatar"
                src="{{ url_for('static', filename='images/logos/vertex_code_logo_github_900x900.png') }}"
                alt="Vertex Code"
                title="Vertex Code"
            >
            <a
                href="https://www.instagram.com/eduardoliboriox?igsh=c2t6NWI1aWdxeThr"
                target="_blank"
                rel="noopener noreferrer"
                class="login-credit-insta"
                title="Instagram"
            >
                <i class="fa-brands fa-instagram"></i>
            </a>
            <button class="login-credit-install" onclick="instalarApp()" title="Instalar App">
                <i class="fa-solid fa-arrow-down-to-bracket"></i>
            </button>
        </div>
    </div>
</div>

<div class="modal" id="modalInstalarIos">
    <div class="modal-content">
        <div class="modal-head">
            <h3>Instalar no iPhone</h3>
            <button type="button" class="modal-x" onclick="document.getElementById('modalInstalarIos').style.display='none'" aria-label="Fechar">×</button>
        </div>
        <div class="ios-install-steps">
            <div class="ios-step">
                <i class="fa-solid fa-arrow-up-from-bracket ios-icon"></i>
                <p>Toque no botão <strong>Compartilhar</strong> na barra do Safari</p>
            </div>
            <div class="ios-step">
                <i class="fa-solid fa-plus-square ios-icon"></i>
                <p>Role para baixo e toque em <strong>"Adicionar à Tela de Início"</strong></p>
            </div>
            <div class="ios-step">
                <i class="fa-solid fa-check ios-icon"></i>
                <p>Toque em <strong>Adicionar</strong> no canto superior direito</p>
            </div>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn-primary" onclick="document.getElementById('modalInstalarIos').style.display='none'">Entendi</button>
        </div>
    </div>
</div>

<script>
let deferredPrompt = null;

function isIos() {
    return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

function isStandalone() {
    return navigator.standalone || window.matchMedia("(display-mode: standalone)").matches;
}

function instalarApp() {
    if (isStandalone()) return;
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        return;
    }
    if (isIos()) {
        document.getElementById("modalInstalarIos").style.display = "flex";
    }
}

window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault();
    deferredPrompt = e;
});

document.addEventListener("DOMContentLoaded", () => {
    if (isStandalone()) {
        const btn = document.getElementById("btn-instalar");
        if (btn) btn.style.display = "none";
    }
});
</script>

</body>
</html>
